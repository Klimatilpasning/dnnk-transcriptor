name: Weekly Transcription ZIP

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-zip:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Create ZIP
      run: |
        if [ ! -d transcriptions ]; then
          echo "transcriptions/ findes ikke!"
          exit 1
        fi
        cd transcriptions
        # Kun .txt — undgå at pakke arkiv-zips eller andet ind
        zip -r "$GITHUB_WORKSPACE/DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip" . -i "*.txt"
        cd "$GITHUB_WORKSPACE"
        ls -lh DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip

    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: DNNK_Transskriptioner_${{ steps.date.outputs.date }}
        path: DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip
        retention-days: 30

    - name: Update rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: transskriptioner-seneste
        name: Transskriptioner (seneste - ${{ steps.date.outputs.date }})
        body: |
          📦 Ugentlig ZIP med alle DNNK webinar-transskriptioner

          **Download ZIP-filen og upload til dit Claude Project**

          Indeholder alle transskriptioner t.o.m. ${{ steps.date.outputs.date }}
        files: DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
